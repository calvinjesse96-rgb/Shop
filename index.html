<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Shop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    color: #333;
  }
  header {
    background: #222;
    color: #fff;
    padding: 20px;
    text-align: center;
  }
  .products {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 30px;
    justify-content: center;
  }
  .card {
    background: #fff;
    width: 220px;
    border-radius: 8px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    overflow: hidden;
    text-align: center;
    padding-bottom: 15px;
  }
  .card img {
    width: 100%;
    height: 150px;
    object-fit: cover;
  }
  .card h3 {
    margin: 10px 0 5px;
  }
  .price {
    color: #2a7a2a;
    font-weight: bold;
    margin-bottom: 10px;
  }
  button {
    background: #222;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 5px;
    cursor: pointer;
  }
  button:hover {
    background: #444;
  }
  #cart-count {
    position: fixed;
    top: 15px;
    right: 20px;
    background: #e63946;
    color: #fff;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 14px;
  }
</style>
</head>
<body>

<div id="cart-count">Cart: 0</div>

<header>
  <h1>My Simple Shop</h1>
  <p>Quality products at great prices</p>
</header>

<div class="products">

  <div class="card">
    <img src="https://picsum.photos/id/1060/220/150" alt="Product 1">
    <h3>Backpack</h3>
    <p class="price">$29.99</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://picsum.photos/id/1080/220/150" alt="Product 2">
    <h3>Headphones</h3>
    <p class="price">$49.99</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://picsum.photos/id/1025/220/150" alt="Product 3">
    <h3>Sneakers</h3>
    <p class="price">$59.99</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

  <div class="card">
    <img src="https://picsum.photos/id/1050/220/150" alt="Product 4">
    <h3>Watch</h3>
    <p class="price">$89.99</p>
    <button onclick="addToCart()">Add to Cart</button>
  </div>

</div>

<script>
  let cart = 0;
  function addToCart() {
    cart++;
    document.getElementById('cart-count').textContent = 'Cart: ' + cart;
  }
</script>

</body>
</html>
